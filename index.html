<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BITS — Business Intelligence Tiga Serangkai</title>
<meta name="description" content="Portal presentasi BITS — Business Intelligence Tiga Serangkai. Satu portal, semua dashboard.">
<link rel="stylesheet" href="src/styles/global.css">
</head>
<body>

<!-- WAITING SCREEN -->
<div class="waiting-screen" id="waiting-screen">
  <div class="waiting-content">
    <img src="assets/brand/bitshorizontal.png" alt="BITS" class="waiting-logo" />
  </div>
</div>

<!-- SPLASH -->
<div class="splash-overlay uninitialized" id="splash">
  <div class="splash-brand">
    <div class="splash-icon">
      <img src="assets/brand/Logo.png" alt="" />
    </div>
    <div class="splash-sep"></div>
    <div class="splash-wordmark">
      <img src="assets/brand/bits.png" alt="BITS" />
    </div>
  </div>
  <div class="splash-dots">
    <span></span><span></span><span></span>
  </div>
</div>

<!-- ═══════════ MOUNT POINTS FOR COMPONENTS ═══════════ -->
<!-- Header (app bar + branding + counter + fullscreen) -->
<div id="headerMount"></div>

<!-- Progress bar -->
<div id="progressMount"></div>

<!-- GLOBAL GLOW -->
<div class="grid-bg"></div>
<div class="global-glow"></div>

<!-- DECK — slides are injected here by app.js -->
<div class="deck" id="deck"></div>

<!-- App entry point (ES module) -->
<script type="module" src="src/app.js"></script>
</body>
</html>
