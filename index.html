<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BITS — Business Intelligence Tiga Serangkai</title>
<meta name="description" content="Portal presentasi BITS — Business Intelligence Tiga Serangkai. Satu portal, semua dashboard.">
<link rel="stylesheet" href="src/styles/global.css">
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <div class="splash-mark">
    <img src="assets/brand/bits.png" alt="BITS" style="height:64px; width:auto; object-fit:contain; animation:pop .7s var(--ease-spring);">
  </div>
  <div class="splash-dots"><span></span><span></span><span></span></div>
</div>

<!-- ═══════════ MOUNT POINTS FOR COMPONENTS ═══════════ -->
<!-- Header (app bar + branding + counter + fullscreen) -->
<div id="headerMount"></div>

<!-- Progress bar -->
<div id="progressMount"></div>

<!-- Dots navigation -->
<div id="dotsMount"></div>

<!-- Arrow navigation -->
<div id="arrowsMount"></div>

<!-- GLOBAL GLOW -->
<div class="grid-bg"></div>
<div class="global-glow"></div>

<!-- DECK — slides are injected here by app.js -->
<div class="deck" id="deck"></div>

<!-- App entry point (ES module) -->
<script type="module" src="src/app.js"></script>
</body>
</html>
